<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DChat - 公告</title>
<style>
  * {margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root {
    --bg: #171717;
    --card: #1c1c1c;
    --text: #eaeaea;
    --subtext: #aaa;
    --border: #333;
    --primary: #3E9AE2;
  }
  body.light-mode {
    --bg: #f5f5f7;
    --card: #ffffff;
    --text: #1c1c1e;
    --subtext: #6e6e73;
    --border: #d1d1d6;
    --primary: #0071e3;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui;
    padding: 20px;
    font-size: 10px;
  }
  .notice-box {
    max-width: 600px;
    margin: 50px auto;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
  }
  .notice-hd {
    font-size: 20px;
    font-weight: 600;
    color: var(--primary);
    text-align: center;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .notice-text {
    line-height: 2;
    white-space: pre-wrap;
    font-size: 15px;
  }
  .notice-text a {
    color: var(--primary);
  }
</style>
</head>
<body>
  <div class="notice-box">
    <div class="notice-hd">DChat最新公告</div>
    <div class="notice-text">
赶快更新并看完公告,Bug联系官方反馈
测试版在一天内无人报告bug将升级为正式版

电脑端使用教程
网页https://cnyszb.github.io/dht/dc.html
大多数功能与手机端无差别，但是多了一些快捷键
1.ESC关闭侧边栏和所有弹窗（用户协议弹窗除外）
2.Enter发送消息
3.Shift+Enter换行
4.设置弹窗打开时，滚轮向前滚动放大字体，向后滚动缩小字体，+键放大字体，-键缩小字体
5.鼠标悬停按钮和卡片有亮度提升效果。
以上所有内容如果自带了键鼠连接手机后也可体验
    </div>
  </div>

  <script>
    // 接收主页面发来的主题切换消息
    window.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'themeChange') {
        if (e.data.theme === 'light') {
          document.body.classList.add('light-mode');
        } else {
          document.body.classList.remove('light-mode');
        }
      }
    });

    // 页面加载时主动向主页面请求当前主题
    window.parent.postMessage({ type: 'themeRequest' }, '*');
  </script>
</body>
</html>
